<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Compass outer ring -->
  <circle cx="32" cy="32" r="28" stroke="#C9A96E" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="24" stroke="#C9A96E" stroke-width="0.8" fill="none"/>
  <!-- Cardinal ticks -->
  <line x1="32" y1="4" x2="32" y2="10" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="60" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="32" x2="10" y2="32" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="60" y2="32" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  <!-- Compass needle North (gold filled) -->
  <polygon points="32,12 28,32 32,28 36,32" fill="#C9A96E"/>
  <!-- Compass needle South (outline) -->
  <polygon points="32,52 28,32 32,36 36,32" fill="#A07840"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#C9A96E"/>
</svg>
